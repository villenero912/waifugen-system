version: '3.8'
services:
  waifugen_app:
    build: .
    container_name: waifugen_app
    restart: always
    env_file: .env
    ports:
      - "8000:8000"
    networks:
      - waifugen_network

  waifugen_postgres:
    image: postgres:15-alpine
    container_name: waifugen_postgres
    restart: always
    environment:
      POSTGRES_USER: waifugen_user
      POSTGRES_PASSWORD: waifugen_db_password_2026
      POSTGRES_DB: waifugen_prod
    networks:
      - waifugen_network

  waifugen_redis:
    image: redis:alpine
    container_name: waifugen_redis
    restart: always
    command: redis-server --requirepass oQInt0uucVZVLgl2PnlZs7WkaCJmTyA4LB0Zj_1h
    networks:
      - waifugen_network

  waifugen_n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: waifugen_n8n
    restart: always
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_DATABASE=waifugen_prod
      - DB_POSTGRESDB_HOST=waifugen_postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_USER=waifugen_user
      - DB_POSTGRESDB_PASSWORD=waifugen_db_password_2026
      - N8N_PROTOCOL=https
      - NODE_ENV=production
      - WEBHOOK_URL=https://waifugen.io/
    ports:
      - "5678:5678"
    networks:
      - waifugen_network

  waifugen_ollama:
    image: ollama/ollama:latest
    container_name: waifugen_ollama
    restart: always
    networks:
      - waifugen_network

  waifugen_prometheus:
    image: prom/prometheus:latest
    container_name: waifugen_prometheus
    restart: always
    networks:
      - waifugen_network

  waifugen_grafana:
    image: grafana/grafana:latest
    container_name: waifugen_grafana
    restart: always
    networks:
      - waifugen_network

  platform_poster:
    build: .
    container_name: platform_poster
    restart: always
    env_file: .env
    command: python src/api/platform_poster_api.py
    ports:
      - "8080:8080"
    networks:
      waifugen_network:
        aliases:
          - platform-poster

networks:
  waifugen_network:
    driver: bridge
