version: '3.8'

# ============================================================
# WaifuGen Elite 8 — Docker Compose
# Servicios: nginx, app, piper, platform_poster, thumbnail,
#            karaoke, postgres, redis, n8n, grafana,
#            prometheus, node_exporter, watchtower
# ============================================================

networks:
  waifugen_net:
    driver: bridge
    name: waifugen_net

volumes:
  postgres_data:
  redis_data:
  n8n_data:
  grafana_data:
  prometheus_data:
  assets_data:

services:

  # ── Reverse Proxy ─────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: waifugen_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
      - assets_data:/app/assets:ro
    depends_on:
      - app
      - n8n
    networks:
      - waifugen_net
    deploy:
      resources:
        limits:
          memory: 256M

  # ── Aplicación Principal (Shim API) ──────────────────────
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: runtime
    container_name: waifugen_app
    restart: unless-stopped
    env_file: .env
    environment:
      - PROJECT_ROOT=/app
      - PYTHONPATH=/app
    volumes:
      - assets_data:/app/assets
      - ./config:/app/config:ro
      - ./src:/app/src:ro
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - waifugen_net
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Piper TTS ─────────────────────────────────────────────
  piper:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: runtime
    container_name: waifugen_piper
    restart: unless-stopped
    env_file: .env
    command: ["python", "src/app.py"]
    volumes:
      - ./voices:/app/voices:ro
    expose:
      - "5000"
    networks:
      - waifugen_net
    deploy:
      resources:
        limits:
          memory: 1G

  # ── Platform Poster ───────────────────────────────────────
  platform_poster:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: runtime
    container_name: waifugen_poster
    restart: unless-stopped
    env_file: .env
    command: ["python", "src/social/platform_poster.py"]
    volumes:
      - assets_data:/app/assets
    expose:
      - "8080"
    networks:
      - waifugen_net
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Thumbnail Service ─────────────────────────────────────
  thumbnail_service:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: runtime
    container_name: waifugen_thumbnails
    restart: unless-stopped
    env_file: .env
    command: ["python", "src/api/thumbnail_service.py"]
    volumes:
      - assets_data:/app/assets
    expose:
      - "8082"
    networks:
      - waifugen_net
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Karaoke Service ───────────────────────────────────────
  karaoke:
    build:
      context: .
      dockerfile: docker/Dockerfile.karaoke
      target: runtime
    container_name: waifugen_karaoke
    restart: unless-stopped
    env_file: .env
    volumes:
      - assets_data:/app/assets
    expose:
      - "8001"
    networks:
      - waifugen_net
    deploy:
      resources:
        limits:
          memory: 1G

  # ── PostgreSQL ────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: waifugen_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-waifugen_production}
      POSTGRES_USER: ${POSTGRES_USER:-waifugen_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      # FIX: solo localhost — no expuesto a internet
      - "127.0.0.1:5432:5432"
    networks:
      - waifugen_net
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-waifugen_user} -d ${POSTGRES_DB:-waifugen_production}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: waifugen_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 60 1
    volumes:
      - redis_data:/data
    ports:
      # FIX: solo localhost
      - "127.0.0.1:6379:6379"
    networks:
      - waifugen_net
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── N8N Workflows ─────────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: waifugen_n8n
    restart: unless-stopped
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB:-waifugen_production}
      - DB_POSTGRESDB_USER=${POSTGRES_USER:-waifugen_user}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:-changeme}
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=https://${DOMAIN:-localhost}/api/
      - GENERIC_TIMEZONE=Asia/Tokyo
      - TZ=Asia/Tokyo
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n_workflows:/home/node/.n8n/workflows:ro
    expose:
      - "5678"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - waifugen_net
    deploy:
      resources:
        limits:
          memory: 2G

  # ── Grafana ───────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: waifugen_grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=https://${DOMAIN:-localhost}/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    expose:
      - "3000"
    depends_on:
      - prometheus
    networks:
      - waifugen_net
    deploy:
      resources:
        limits:
          memory: 1G

  # ── Prometheus ────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: waifugen_prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-15d}'
      - '--web.enable-lifecycle'
      - '--web.external-url=https://${DOMAIN:-localhost}/prometheus/'
    volumes:
      - prometheus_data:/prometheus
      - ./monitoring/prometheus:/etc/prometheus:ro
    expose:
      - "9090"
    networks:
      - waifugen_net
    deploy:
      resources:
        limits:
          memory: 1G

  # ── Node Exporter (métricas del servidor) ─────────────────
  node_exporter:
    image: prom/node-exporter:latest
    container_name: waifugen_node_exporter
    restart: unless-stopped
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    expose:
      - "9100"
    networks:
      - waifugen_net

  # ── Watchtower (auto-updates) ─────────────────────────────
  watchtower:
    image: containrrr/watchtower:latest
    container_name: waifugen_watchtower
    restart: unless-stopped
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=86400   # 24h
      - WATCHTOWER_NOTIFICATIONS=slack
      - WATCHTOWER_NOTIFICATION_SLACK_HOOK_URL=${SLACK_WEBHOOK_URL:-}
    volumes:
      # FIX: docker socket solo lectura
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - waifugen_net
    deploy:
      resources:
        limits:
          memory: 128M
