# ============================================================
# NGINX - WaifuGen Elite 8 System
# Reverse proxy + SSL + Rate limiting + Security headers
# ============================================================

# Número de procesos worker (= núcleos de CPU)
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ──────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # ── Performance ──────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 500M;   # vídeos grandes
    server_tokens off;           # ocultar versión nginx

    # ── Compresión ───────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;

    # ── Rate Limiting ────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=upload:10m rate=2r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ── Upstream Services ────────────────────────────────────
    upstream app_service {
        server app:8000;
        keepalive 32;
    }

    upstream piper_tts {
        server piper:5000;
        keepalive 16;
    }

    upstream platform_poster {
        server platform_poster:8080;
        keepalive 16;
    }

    upstream thumbnail_service {
        server thumbnail_service:8082;
        keepalive 16;
    }

    upstream karaoke_service {
        server karaoke:8001;
        keepalive 16;
    }

    upstream n8n_service {
        server n8n:5678;
        keepalive 16;
    }

    upstream grafana_service {
        server grafana:3000;
        keepalive 8;
    }

    upstream prometheus_service {
        server prometheus:9090;
        keepalive 8;
    }

    # ── Security Headers (comunes) ───────────────────────────
    map $sent_http_content_type $csp_header {
        default "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';";
    }

    # ============================================================
    # HTTP → HTTPS Redirect
    # ============================================================
    server {
        listen 80;
        server_name _;

        # Health check sin redirect (para load balancers)
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ============================================================
    # HTTPS - Servidor Principal
    # ============================================================
    server {
        listen 443 ssl http2;
        server_name _;

        # ── SSL ──────────────────────────────────────────────
        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # ── Security Headers ─────────────────────────────────
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy $csp_header always;

        # ── Health Check ─────────────────────────────────────
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # ── N8N Workflows ────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            limit_conn conn_limit 10;

            proxy_pass http://n8n_service/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_connect_timeout 30s;
        }

        # ── Shim API (generación de vídeo) ───────────────────
        location /generate/ {
            limit_req zone=api burst=10 nodelay;

            proxy_pass http://app_service/api/generate/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 600s;   # generación puede tardar
        }

        # ── Piper TTS ────────────────────────────────────────
        location /tts/ {
            limit_req zone=api burst=5 nodelay;

            proxy_pass http://piper_tts/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 120s;
        }

        # ── Platform Poster ──────────────────────────────────
        location /poster/ {
            limit_req zone=upload burst=5 nodelay;

            proxy_pass http://platform_poster/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 300s;
            client_max_body_size 500M;
        }

        # ── Thumbnail Service ────────────────────────────────
        location /thumbnails/ {
            limit_req zone=api burst=10 nodelay;

            proxy_pass http://thumbnail_service/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 60s;
        }

        # ── Karaoke Service ──────────────────────────────────
        location /karaoke/ {
            limit_req zone=upload burst=3 nodelay;

            proxy_pass http://karaoke_service/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 300s;
            client_max_body_size 500M;
        }

        # ── Grafana (monitoreo) ──────────────────────────────
        location /grafana/ {
            limit_req zone=general burst=20 nodelay;

            proxy_pass http://grafana_service/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Solo acceso interno — bloquear IPs externas
            # allow 10.0.0.0/8;
            # allow 172.16.0.0/12;
            # deny all;
        }

        # ── Prometheus — solo acceso local ──────────────────
        location /prometheus/ {
            # BLOQUEADO a internet — solo acceso interno
            allow 127.0.0.1;
            allow 172.16.0.0/12;
            allow 10.0.0.0/8;
            deny all;

            proxy_pass http://prometheus_service/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # ── Bloquear rutas sensibles ─────────────────────────
        location ~ /\. {
            deny all;
            return 404;
        }

        location ~ /(\.env|\.git|config|docker) {
            deny all;
            return 404;
        }

        # ── Assets estáticos ─────────────────────────────────
        location /static/ {
            alias /app/assets/static/;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # ── Default ─────────────────────────────────────────
        location / {
            limit_req zone=general burst=30 nodelay;
            proxy_pass http://app_service;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
