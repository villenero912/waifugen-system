server {
  listen 80;
  server_name n8n.waifugen.io;
  return 301 https://$host$request_uri;
}
server {
  listen 443 ssl;
  server_name n8n.waifugen.io;
  ssl_certificate     /etc/letsencrypt/live/n8n.waifugen.io/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/n8n.waifugen.io/privkey.pem;

  resolver 127.0.0.11 valid=30s ipv6=off;
  set $n8n_upstream http://waifugen_n8n:5678;

  location / {
    proxy_pass $n8n_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 3600;
    proxy_send_timeout 3600;
  }
}
